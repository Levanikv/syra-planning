<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning Chantier — Compagnons & Travaux</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

:root {
  --bg: #0C0E12;
  --surface: #14171D;
  --surface-2: #1C2028;
  --surface-3: #242830;
  --border: #2A2E38;
  --border-light: #363A44;
  --text: #E8EAED;
  --text-muted: #8B8F98;
  --text-dim: #5C6070;
  --accent: #F59E0B;
  --accent-dim: rgba(245,158,11,0.12);
  --accent-hover: #FBBF24;
  --green: #34D399;
  --green-dim: rgba(52,211,153,0.12);
  --blue: #60A5FA;
  --blue-dim: rgba(96,165,250,0.12);
  --red: #F87171;
  --red-dim: rgba(248,113,113,0.12);
  --purple: #A78BFA;
  --purple-dim: rgba(167,139,250,0.12);
  --pink: #F472B6;
  --pink-dim: rgba(244,114,182,0.12);
  --cyan: #22D3EE;
  --cyan-dim: rgba(34,211,238,0.12);
  --orange: #FB923C;
  --orange-dim: rgba(251,146,60,0.12);
  --today: rgba(245,158,11,0.06);
  --weekend: rgba(255,255,255,0.02);
  --radius: 8px;
  --radius-sm: 5px;
  --transition: 150ms ease;
  --font: 'DM Sans', -apple-system, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

/* ─── LIGHT MODE ─── */
html.light-mode, .light-mode {
  --bg: #F3F4F6;
  --surface: #FFFFFF;
  --surface-2: #F9FAFB;
  --surface-3: #E5E7EB;
  --border: #D1D5DB;
  --border-light: #9CA3AF;
  --text: #111827;
  --text-muted: #6B7280;
  --text-dim: #9CA3AF;
  --accent: #D97706;
  --accent-dim: rgba(217,119,6,0.1);
  --accent-hover: #B45309;
  --today: rgba(217,119,6,0.08);
  --weekend: rgba(0,0,0,0.02);
  --green: #059669;
  --green-dim: rgba(5,150,105,0.1);
  --blue: #2563EB;
  --blue-dim: rgba(37,99,235,0.1);
  --red: #DC2626;
  --red-dim: rgba(220,38,38,0.1);
  --purple: #7C3AED;
  --purple-dim: rgba(124,58,237,0.1);
  --pink: #DB2777;
  --pink-dim: rgba(219,39,119,0.1);
  --cyan: #0891B2;
  --cyan-dim: rgba(8,145,178,0.1);
  --orange: #EA580C;
  --orange-dim: rgba(234,88,12,0.1);
}

.light-mode .logo-dark { display: none; }
.light-mode .logo-light { display: block; }
.logo-light { display: none; }

.light-mode .worker-name.is-st { background: #EDE9FE; }
.light-mode .worker-name.is-st:hover { background: #DDD6FE; }
.light-mode .cell.is-st { background: #F5F3FF; }
.light-mode .cell.is-st.weekend, .light-mode .cell.is-st.holiday { background: rgba(0,0,0,0.02); }
.light-mode .cell.is-st.today { background: rgba(217,119,6,0.08); }

.light-mode .modal { box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
.light-mode .context-menu { box-shadow: 0 8px 24px rgba(0,0,0,0.12); }

.light-mode .worker-name { background: var(--bg); }
.light-mode .worker-name:hover { background: var(--surface-3); }
.light-mode .grid-corner { background: var(--surface); }
.light-mode .day-header { background: var(--surface); }
.light-mode .week-header { background: var(--surface); }
.light-mode .st-badge { background: rgba(124,58,237,0.1); color: #7C3AED; }
.light-mode .toast { background: #111827; color: #F9FAFB; border-color: #374151; }

/* ─── THEME TOGGLE ─── */
.theme-toggle {
  display: flex;
  border-radius: 20px;
  border: 1px solid var(--border);
  overflow: hidden;
  background: var(--surface-2);
}

.theme-btn {
  width: 34px; height: 30px;
  display: grid; place-items: center;
  border: none;
  background: transparent;
  color: var(--text-dim);
  cursor: pointer;
  transition: all var(--transition);
  font-size: 14px;
}

.theme-btn:hover { color: var(--text); }
.theme-btn.active { background: var(--accent-dim); color: var(--accent); }

html, body { 
  height: 100%; 
  font-family: var(--font); 
  background: var(--bg); 
  color: var(--text);
  overflow: hidden;
}

/* ─── LAYOUT ─── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  border-bottom: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  padding: 0;
}

.header-top {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 24px;
  border-bottom: 1px solid var(--border);
}

.header-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 24px;
}

.nav-group {
  display: flex;
  align-items: center;
  gap: 10px;
}

.nav-group h1 {
  font-size: 16px; font-weight: 600; letter-spacing: -0.02em;
  margin-right: 4px;
}

.date-range {
  font-size: 13px;
  color: var(--text-muted);
  font-weight: 400;
  padding: 0 4px;
}

.logo-svg {
  height: 28px;
  width: auto;
  color: var(--text);
  flex-shrink: 0;
}

.header-actions {
  display: flex; align-items: center; gap: 10px;
}

.header-filters {
  display: flex; gap: 4px; margin-right: 6px;
}

.btn {
  display: inline-flex; align-items: center; gap: 7px;
  padding: 8px 14px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-family: var(--font);
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
  white-space: nowrap;
}

.btn:hover { border-color: var(--border-light); background: var(--surface-3); }

.btn-primary {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  font-weight: 600;
}

.btn-primary:hover { background: var(--accent-hover); border-color: var(--accent-hover); }

.btn-sm { padding: 5px 10px; font-size: 12px; }

.btn-icon {
  width: 34px; height: 34px; padding: 0;
  display: grid; place-items: center;
  border-radius: var(--radius);
}

.filter-chip {
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  transition: all var(--transition);
  font-family: var(--font);
}

.filter-chip:hover { border-color: var(--border-light); color: var(--text); }
.filter-chip.active { 
  background: var(--accent-dim); 
  border-color: var(--accent); 
  color: var(--accent); 
}

.filter-label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.06em;
  font-weight: 600;
  margin-right: 4px;
}

.filter-sep {
  width: 1px; height: 20px;
  background: var(--border);
  margin: 0 6px;
}

/* ─── GRID ─── */
.grid-wrapper {
  flex: 1;
  overflow: auto;
  position: relative;
}

.planning-grid {
  display: grid;
  min-width: max-content;
  min-height: 100%;
}

/* Sous-traitant row tint */
.worker-name.is-st { background: #13151B; }
.worker-name.is-st:hover { background: #1A1D25; }
.cell.is-st { background: #100F15; }
.cell.is-st.weekend, .cell.is-st.holiday { background: var(--weekend); }
.cell.is-st.today { background: var(--today); }

.worker-name .st-badge {
  font-size: 8px;
  padding: 1px 5px;
  border-radius: 3px;
  background: var(--purple-dim);
  color: var(--purple);
  font-weight: 700;
  letter-spacing: 0.04em;
  flex-shrink: 0;
}

/* ─── TV / Large screen scaling ─── */
@media (min-width: 1400px) {
  .cell-content { font-size: 12px; padding: 5px 10px; }
  .day-header .day-num { font-size: 17px; }
  .day-header .day-name { font-size: 11px; }
  .worker-name .name { font-size: 15px; }
  .worker-name .role { font-size: 11px; }
  .crew-bar { width: 5px; }
  .crew-tag { font-size: 10px; }
  .week-header { font-size: 12px; }
}

@media (min-width: 1920px) {
  .cell-content { font-size: 13px; padding: 6px 12px; }
  .day-header .day-num { font-size: 18px; }
  .worker-name .name { font-size: 16px; }
  .crew-bar { width: 6px; }
  .crew-tag { font-size: 11px; padding: 2px 8px; }
  .week-header { font-size: 13px; padding: 8px 0 4px; }
  .legend { padding: 10px 24px; }
  .legend-item { font-size: 13px; }
  .legend-dot { width: 12px; height: 12px; }
}

.grid-corner {
  position: sticky;
  left: 0; top: 0;
  z-index: 30;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 0 12px;
  display: flex; align-items: center;
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  font-weight: 600;
  white-space: nowrap;
}

.week-header {
  position: sticky; top: 0;
  z-index: 20;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  text-align: center;
  padding: 6px 0 2px;
  font-size: 11px;
  font-weight: 600;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: 0.1em;
}

.week-month {
  color: var(--text-dim);
  font-weight: 400;
  font-size: 9px;
  letter-spacing: 0.05em;
  margin-left: 2px;
}

.day-header {
  position: sticky; top: 0;
  z-index: 20;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  text-align: center;
  padding: 4px 2px 6px;
  overflow: hidden;
}

.day-header .day-name {
  font-size: 10px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 600;
}

.day-header .day-num {
  font-size: 15px;
  font-weight: 600;
  color: var(--text);
  margin-top: 2px;
  font-family: var(--mono);
}

.day-header.today { background: var(--accent-dim); }
.day-header.today .day-num { color: var(--accent); }

/* Off-day headers (weekends + holidays) — minimal */
.day-header.off { padding: 4px 0 6px; }
.day-header.off .day-name { opacity: 0.35; font-size: 9px; }

.day-header.holiday .day-name { color: var(--accent); opacity: 0.7; }
.day-header .holiday-label {
  font-size: 7px;
  color: var(--accent);
  opacity: 0.8;
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.worker-name {
  position: sticky;
  left: 0;
  z-index: 10;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 0 12px;
  display: flex;
  align-items: center;
  gap: 8px;
  white-space: nowrap;
  transition: background var(--transition);
}

.worker-name:hover { background: var(--surface); }

.crew-bar {
  width: 4px;
  align-self: stretch;
  border-radius: 2px;
  flex-shrink: 0;
  margin: 6px 0;
}

.worker-info { min-width: 0; flex: 1; }
.worker-info .name { font-size: 13px; font-weight: 600; white-space: nowrap; }
.worker-info .role { font-size: 10px; color: var(--text-muted); margin-top: 1px; white-space: nowrap; }

.crew-tag {
  font-size: 9px;
  padding: 1px 6px;
  border-radius: 3px;
  font-weight: 600;
  flex-shrink: 0;
  white-space: nowrap;
  letter-spacing: 0.02em;
}

.cell {
  border-bottom: 1px solid var(--border);
  border-right: 1px solid rgba(255,255,255,0.03);
  padding: 4px 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background var(--transition);
  position: relative;
  min-height: 0;
}

.cell:hover { background: var(--surface-2); }
.cell.weekend { background: var(--weekend); cursor: default; }
.cell.weekend:hover { background: var(--weekend); }

.cell.holiday { background: rgba(245,158,11,0.04); cursor: default; }
.cell.holiday:hover { background: rgba(245,158,11,0.04); }
.cell.today { background: var(--today); }

.cell-content {
  font-size: 11px;
  font-weight: 600;
  padding: 4px 8px;
  border-radius: var(--radius-sm);
  text-align: center;
  line-height: 1.3;
  max-width: 100%;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  letter-spacing: 0.01em;
}

/* Chantier color coding */
.chantier-0  { background: var(--blue-dim);   color: var(--blue);   }
.chantier-1  { background: var(--green-dim);  color: var(--green);  }
.chantier-2  { background: var(--purple-dim); color: var(--purple); }
.chantier-3  { background: var(--orange-dim); color: var(--orange); }
.chantier-4  { background: var(--pink-dim);   color: var(--pink);   }
.chantier-5  { background: var(--cyan-dim);   color: var(--cyan);   }
.chantier-6  { background: var(--red-dim);    color: var(--red);    }
.chantier-7  { background: var(--accent-dim); color: var(--accent); }

/* ─── MODAL ─── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 100;
  display: none;
  place-items: center;
  animation: fadeIn 150ms ease;
}

.modal-overlay.active { display: grid; }

@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideUp { from { transform: translateY(12px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  width: 420px;
  max-width: 95vw;
  max-height: 90vh;
  overflow-y: auto;
  animation: slideUp 200ms ease;
}

.modal-header {
  padding: 20px 24px 16px;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}

.modal-header h2 {
  font-size: 16px; font-weight: 600;
}

.modal-close {
  width: 30px; height: 30px;
  border-radius: var(--radius);
  border: none; background: var(--surface-2);
  color: var(--text-muted);
  cursor: pointer;
  display: grid; place-items: center;
  font-size: 18px;
  transition: all var(--transition);
}

.modal-close:hover { background: var(--surface-3); color: var(--text); }

.modal-body { padding: 20px 24px; }

.form-group { margin-bottom: 16px; }

.form-group label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

.form-group input, .form-group select {
  width: 100%;
  padding: 10px 12px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text);
  font-family: var(--font);
  font-size: 14px;
  transition: border-color var(--transition);
  outline: none;
}

.form-group input:focus, .form-group select:focus {
  border-color: var(--accent);
}

.form-group select option { background: var(--surface-2); }

.modal-footer {
  padding: 16px 24px 20px;
  display: flex; gap: 8px; justify-content: flex-end;
}

.modal-footer .btn { min-width: 100px; justify-content: center; }

/* Assign modes */
.assign-modes {
  display: flex; gap: 6px;
}

.assign-mode {
  flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 8px;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  background: var(--surface-2);
  color: var(--text-muted);
  font-family: var(--font);
  font-size: 12px; font-weight: 500;
  cursor: pointer;
  transition: all var(--transition);
}

.assign-mode:hover { border-color: var(--border-light); color: var(--text); }

.assign-mode.active {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

.assign-preview {
  margin-top: 12px;
  padding: 10px 12px;
  border-radius: var(--radius);
  background: var(--surface-2);
  font-size: 12px;
  color: var(--text-muted);
  line-height: 1.5;
  min-height: 36px;
  display: flex; align-items: center;
}

.assign-preview strong { color: var(--text); font-weight: 600; margin: 0 3px; }

/* Team panel */
.team-section-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  font-weight: 700;
  color: var(--text-dim);
  margin-bottom: 8px;
}

.team-list {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.team-row {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 10px;
  border-radius: var(--radius);
  transition: background var(--transition);
}

.team-row:hover { background: var(--surface-2); }

.team-row .team-info { flex: 1; min-width: 0; }

.team-row .team-name {
  font-size: 13px; font-weight: 600;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.team-row .team-role {
  font-size: 11px; color: var(--text-muted); margin-top: 1px;
}

.team-row .team-stats {
  font-size: 11px; color: var(--text-dim);
  font-family: var(--mono);
  white-space: nowrap;
}

.team-actions {
  display: flex; gap: 4px;
}

.team-actions .btn-icon {
  width: 28px; height: 28px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  background: transparent;
  color: var(--text-muted);
  cursor: pointer;
  display: grid; place-items: center;
  transition: all var(--transition);
}

.team-actions .btn-icon:hover {
  background: var(--surface-3);
  border-color: var(--border);
  color: var(--text);
}

.team-actions .btn-icon.danger:hover {
  background: var(--red-dim);
  border-color: rgba(248,113,113,0.3);
  color: var(--red);
}

.team-empty {
  padding: 12px;
  text-align: center;
  font-size: 12px;
  color: var(--text-dim);
}

/* Delete confirmation inline */
.confirm-delete {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 10px;
  background: var(--red-dim);
  border-radius: var(--radius);
  margin-top: 4px;
}

.confirm-delete span {
  font-size: 12px;
  color: var(--red);
  flex: 1;
}

.confirm-delete .btn-sm {
  padding: 4px 10px;
  font-size: 11px;
}

/* Color picker */
.color-picker {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
}

.color-swatch {
  width: 28px; height: 28px;
  border-radius: 6px;
  cursor: pointer;
  border: 2px solid transparent;
  transition: all var(--transition);
}

.color-swatch:hover { transform: scale(1.15); }
.color-swatch.active { border-color: var(--text); box-shadow: 0 0 0 2px var(--bg); }

/* Crew member picker */
.crew-members-picker {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.member-chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-muted);
  transition: all var(--transition);
  font-family: var(--font);
}

.member-chip:hover { border-color: var(--border-light); color: var(--text); }

.member-chip.selected {
  background: var(--accent-dim);
  border-color: var(--accent);
  color: var(--accent);
}

.member-chip .chip-check {
  font-size: 10px;
}

/* ─── TOAST ─── */
.toast {
  position: fixed;
  bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--surface-3);
  border: 1px solid var(--border-light);
  color: var(--text);
  padding: 12px 20px;
  border-radius: var(--radius);
  font-size: 13px; font-weight: 500;
  z-index: 200;
  transition: transform 300ms ease;
  pointer-events: none;
}

.toast.visible { transform: translateX(-50%) translateY(0); }

/* ─── TV MODE ─── */
.tv-mode .header-top { padding: 10px 24px; }
.tv-mode .header-top .header-actions { display: none; }
.tv-mode .header-top .logo-svg { height: 24px; }
.tv-mode .header-nav { display: none; }
.tv-mode .cell { cursor: default; }
.tv-mode .worker-name { cursor: default; pointer-events: none; }

/* In TV mode, show nav inside header-top on the right */
.tv-nav {
  display: none;
  align-items: center;
  gap: 10px;
}

.tv-nav h1 {
  font-size: 15px;
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--text-muted);
}

.tv-mode .tv-nav { display: flex; }
.tv-mode .header-top { display: flex; }

/* ─── LEGEND ─── */
.legend {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 8px 24px;
  border-top: 1px solid var(--border);
  background: var(--surface);
  flex-shrink: 0;
  flex-wrap: wrap;
  min-height: 40px;
}

.legend-item {
  display: flex; align-items: center; gap: 5px;
  font-size: 11px; color: var(--text-muted);
}

.legend-dot {
  width: 10px; height: 10px;
  border-radius: 3px;
}

/* ─── CONTEXT MENU ─── */
.context-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border-light);
  border-radius: var(--radius);
  padding: 4px;
  z-index: 50;
  min-width: 160px;
  display: none;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: fadeIn 100ms ease;
}

.context-menu.active { display: block; }

.context-item {
  padding: 8px 12px;
  font-size: 13px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  color: var(--text);
  display: flex; align-items: center; gap: 8px;
  transition: background var(--transition);
  border: none; background: none; width: 100%;
  font-family: var(--font);
  text-align: left;
}

.context-item:hover { background: var(--surface-3); }
.context-item.danger { color: var(--red); }
.context-item.danger:hover { background: var(--red-dim); }

/* ─── SCROLLBAR ─── */
.grid-wrapper::-webkit-scrollbar { width: 8px; height: 8px; }
.grid-wrapper::-webkit-scrollbar-track { background: var(--bg); }
.grid-wrapper::-webkit-scrollbar-thumb { background: var(--surface-3); border-radius: 4px; }
.grid-wrapper::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ─── RESPONSIVE ─── */
</style>
</head>

<!-- MODAL: Assigner chantier -->
<div class="modal-overlay" id="assignModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="assignTitle">Assigner un chantier</h2>
      <button class="modal-close" onclick="closeModal('assignModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Chantier</label>
        <select id="assignChantier">
          <option value="">— Vide (retirer) —</option>
        </select>
      </div>
      <div class="form-group" id="scopeGroup" style="display:none;">
        <label>Attribuer à</label>
        <div class="assign-modes">
          <button class="assign-mode active" data-scope="personal" onclick="setAssignScope('personal')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="7" cy="7" r="4"/></svg>
            <span id="scopePersonalLabel">Perso</span>
          </button>
          <button class="assign-mode" data-scope="crew" onclick="setAssignScope('crew')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><circle cx="5" cy="6" r="3"/><circle cx="9" cy="6" r="3"/></svg>
            <span id="scopeCrewLabel">Binôme</span>
          </button>
        </div>
      </div>
      <div class="form-group">
        <label>Appliquer sur</label>
        <div class="assign-modes">
          <button class="assign-mode active" data-mode="day" onclick="setAssignMode('day')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="10" height="10" rx="1.5"/></svg>
            Ce jour
          </button>
          <button class="assign-mode" data-mode="week" onclick="setAssignMode('week')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="12" height="2" rx="1"/><rect x="1" y="8" width="8" height="2" rx="1"/></svg>
            La semaine
          </button>
          <button class="assign-mode" data-mode="range" onclick="setAssignMode('range')">
            <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 7h10M2 4h4M8 10h4"/></svg>
            Plage perso
          </button>
        </div>
      </div>
      <!-- DAY mode: single date -->
      <div class="form-group assign-date-fields" id="dayFields">
        <label>Jour</label>
        <input type="date" id="assignDay">
      </div>
      <!-- WEEK mode: dropdown of weeks with date range -->
      <div class="form-group assign-date-fields" id="weekFields" style="display:none;">
        <label>Semaine</label>
        <select id="assignWeekSelect"></select>
      </div>
      <!-- RANGE mode: start + end -->
      <div class="form-group assign-date-fields" id="rangeFields" style="display:none;">
        <div style="display:flex; gap:10px;">
          <div style="flex:1;">
            <label>Du</label>
            <input type="date" id="assignStart">
          </div>
          <div style="flex:1;">
            <label>Au</label>
            <input type="date" id="assignEnd">
          </div>
        </div>
      </div>
      <div class="assign-preview" id="assignPreview"></div>
    </div>
    <div class="modal-footer">
      <button class="btn" onclick="closeModal('assignModal')">Annuler</button>
      <button class="btn btn-primary" onclick="confirmAssign()">Valider</button>
    </div>
  </div>
</div>

<!-- PANEL: Gestion équipe -->
<div class="modal-overlay" id="teamPanel">
  <div class="modal" style="width:560px; max-height:90vh;">
    <div class="modal-header">
      <h2>Gestion de l'équipe</h2>
      <button class="modal-close" onclick="closeModal('teamPanel')">×</button>
    </div>
    <div class="modal-body" style="padding:12px 24px 20px; overflow-y:auto;">
      <div class="team-section-label">Binômes / Équipes</div>

      <button class="btn btn-sm" style="margin-top:8px;" onclick="openCrewForm(-1)">
        <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 1v10M1 6h10"/></svg>
        Nouveau binôme
      </button>

      <div class="team-section-label" style="margin-top:20px;">Compagnons</div>
      <div id="teamListCompagnons" class="team-list"></div>
      <div class="team-section-label" style="margin-top:16px;">Sous-traitants</div>
      <div id="teamListSoustraitants" class="team-list"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" onclick="openWorkerForm(-1)">
        <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2"><path d="M7 2v10M2 7h10"/></svg>
        Ajouter un membre
      </button>
    </div>
  </div>
</div>

<!-- MODAL: Ajouter / Modifier un membre -->
<div class="modal-overlay" id="workerModal">
  <div class="modal">
    <div class="modal-header">
      <h2 id="workerModalTitle">Ajouter un membre</h2>
      <button class="modal-close" onclick="closeModal('workerModal')">×</button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label>Nom</label>
        <input type="text" id="workerName" placeholder="ex: Jean-Pierre">
      </div>
      <div style="display:flex; gap:10px;">
        <div class="form-group" style="flex:1;">
          <label>Type</label>
          <select id="workerType">
            <option value="compagnon">Compagnon</option>
            <option value="sous-traitant">Sous-traitant</option>
          </select>
        </div>
        <div class="form-group" style="flex:1;">
          <label>Binôme</label>
          <select id="workerCrew"></select>
        </div>
      </div>

function requireUnlock(action) {
  if (tvMode) return; // TV mode = read only
  if (isUnlocked) { action(); return; }
  pendingAction = action;
  document.getElementById('pinError').textContent = '';
  document.getElementById('pinInput').value = '';

  document.getElementById('pinDesc').textContent = 'Entrez le code PIN pour modifier le planning';

function submitPin() {
  const input = document.getElementById('pinInput').value.trim();
  if (!input) return;
  
  pinRef.once('value').then(snap => {
    const storedPin = snap.val();
    if (!storedPin) {
      // No PIN set yet — this input becomes the PIN
      pinRef.set(input).then(() => {
        isUnlocked = true;
        closeModal('pinModal');
        showToast('Code PIN défini !');
        if (pendingAction) { pendingAction(); pendingAction = null; }
      });
    } else if (input === storedPin) {
      isUnlocked = true;
      closeModal('pinModal');
      showToast('Planning déverrouillé');
      if (pendingAction) { pendingAction(); pendingAction = null; }
    } else {
      document.getElementById('pinError').textContent = 'Code incorrect';
      document.getElementById('pinInput').value = '';
      document.getElementById('pinInput').focus();

  });
}

// ─── DATE UTILS ───
function dateKey(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const day = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${day}`;
}

function getMonday(d) {
  const dt = new Date(d);
  const day = dt.getDay();
  const diff = day === 0 ? -6 : 1 - day;
  dt.setDate(dt.getDate() + diff);
  dt.setHours(0,0,0,0);
  return dt;
}

function addDays(d, n) {
  const dt = new Date(d);
  dt.setDate(dt.getDate() + n);
  return dt;
}

function isWeekend(d) {
  const day = d.getDay();
  return day === 0 || day === 6;
}

function getWeekNumber(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const dayNum = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - dayNum);
  const yearStart = new Date(Date.UTC(dt.getUTCFullYear(),0,1));
  return Math.ceil((((dt - yearStart) / 86400000) + 1)/7);
}

function todayKey() { return dateKey(new Date()); }

// ─── CHANTIER COLOR MAP ───
function getChantierColor(name) {
  const idx = state.chantiers.indexOf(name);
  if (idx === -1) return 'chantier-0';
  return CHANTIER_COLORS[idx % CHANTIER_COLORS.length];
}

// ─── RENDER ───
const OFF_COL = '20px';
const WORK_COL = 'minmax(75px, 1fr)';

function buildGridCols(days) {
  const cols = days.map(d => isOffDay(d) ? OFF_COL : WORK_COL);
  return `auto ${cols.join(' ')}`;
}

function render() {
  const today = new Date();
  // Rolling year: 26 weeks back + 26 weeks forward
  const startMonday = addDays(getMonday(today), -26 * 7);
  const totalDays = 52 * 7;

  const days = [];
  for (let i = 0; i < totalDays; i++) {
    days.push(addDays(startMonday, i));
  }

  // Update date range display
  document.getElementById('dateRange').textContent = `${startMonday.getFullYear()} — ${days[days.length-1].getFullYear()}`;

  // Merged worker list — group by crew within type
  const allWorkers = state.workers.map((w, idx) => ({...w, origIdx: idx}))
    .filter(w => teamFilter === 'all' || w.type === teamFilter);
  
  function crewSort(a, b) {
    const aCrewIdx = a.crewId ? state.crews.findIndex(c => c.id === a.crewId) : 999;
    const bCrewIdx = b.crewId ? state.crews.findIndex(c => c.id === b.crewId) : 999;
    if (aCrewIdx !== bCrewIdx) return aCrewIdx - bCrewIdx;
    return 0; // preserve original order within same crew
  }
  
  const sortedWorkers = [
    ...allWorkers.filter(w => w.type === 'compagnon').sort(crewSort),
    ...allWorkers.filter(w => w.type === 'sous-traitant').sort(crewSort),
  ];

  const wrapper = document.getElementById('gridWrapper');
  wrapper.className = 'grid-wrapper';

  const gridCols = buildGridCols(days);
  const weeks = gatherWeeks(days);
  const gridRows = `auto auto repeat(${sortedWorkers.length}, minmax(40px, 1fr))`;

  let html = buildHeaders(days, weeks);
  let row = 3;
  sortedWorkers.forEach(w => {
    html += renderWorkerRow(w, days, row);
    row++;
  });

  wrapper.innerHTML = `<div class="planning-grid" style="grid-template-columns:${gridCols}; grid-template-rows:${gridRows};">${html}</div>`;
  renderLegend(sortedWorkers);
}

function gatherWeeks(days) {
  const weeks = [];
  let currentWeek = null;
  days.forEach((d, i) => {
    const wn = getWeekNumber(d);
    if (!currentWeek || currentWeek.num !== wn) {
      // Use the Monday of this week for the month label
      const monday = getMonday(d);
      currentWeek = { num: wn, start: i, span: 1, month: MONTHS_FR[monday.getMonth()] };
      weeks.push(currentWeek);
    } else {
      currentWeek.span++;
    }
  });
  return weeks;
}

function buildHeaders(days, weeks) {
  let html = '';
  html += `<div class="grid-corner" style="grid-row:1;">ÉQUIPE</div>`;
  weeks.forEach(w => {
    html += `<div class="week-header" style="grid-column: span ${w.span}; grid-row:1;">S${w.num} <span class="week-month">${w.month}</span></div>`;
  });

  html += `<div class="grid-corner" style="grid-row:2; border-top:none;"></div>`;
  const tk = todayKey();
  days.forEach((d, i) => {
    const dk = dateKey(d);
    const we = isWeekend(d);
    const hol = isHoliday(dk);
    const off = we || hol;
    let cls = 'day-header';
    if (dk === tk) cls += ' today';
    if (we) cls += ' weekend';
    if (hol && !we) cls += ' holiday';
    if (off) cls += ' off';
    
    // Off-day: just show initial letter. Work day: full display.
    const dayLabel = off
      ? `<div class="day-name">${DAYS_FR[d.getDay()].charAt(0)}</div>`
      : `<div class="day-name">${DAYS_FR[d.getDay()]}</div><div class="day-num">${d.getDate()}</div>${hol ? `<div class="holiday-label">${getHolidayName(dk)}</div>` : ''}`;

    html += `<div class="${cls}" style="grid-column:${i+2}; grid-row:2;">${dayLabel}</div>`;
  });
  return html;
}

function renderWorkerRow(worker, days, row) {
  const isST = worker.type === 'sous-traitant';
  const stCls = isST ? ' is-st' : '';
  const stBadge = isST ? '<span class="st-badge">ST</span>' : '';
  
  // Crew info
  const crew = worker.crewId ? state.crews.find(c => c.id === worker.crewId) : null;
  const crewBar = crew 
    ? `<div class="crew-bar" style="background:${crew.color};"></div>` 
    : `<div class="crew-bar" style="background:transparent;"></div>`;
  const crewTag = crew 
    ? `<span class="crew-tag" style="background:${crew.color}20; color:${crew.color};">${crew.name}</span>` 
    : '';

  let html = `<div class="worker-name${stCls}" style="grid-row:${row}; cursor:pointer;" onclick="openWorkerForm(${worker.origIdx})">
    ${crewBar}
    <div class="worker-info">
      <div class="name">${worker.name}</div>
      ${worker.role ? `<div class="role">${worker.role}</div>` : ''}
    </div>
    ${crewTag}
    ${stBadge}
  </div>`;

  const tk = todayKey();
  days.forEach((d, i) => {
    const dk = dateKey(d);
    const we = isWeekend(d);
    const hol = isHoliday(dk);
    const off = we || hol;
    const key = `${worker.origIdx}_${dk}`;
    const chantier = state.assignments[key] || '';

    let cls = 'cell' + stCls;
    if (dk === tk) cls += ' today';
    if (we) cls += ' weekend';
    if (hol && !we) cls += ' holiday';

    let content = '';
    if (chantier && !off) {
      const cc = getChantierColor(chantier);
      content = `<div class="cell-content ${cc}">${chantier}</div>`;
    }

    html += `<div class="${cls}" style="grid-column:${i+2}; grid-row:${row};" 
      data-worker="${worker.origIdx}" data-date="${dk}"
      ${off ? '' : `onclick="cellClick(event, ${worker.origIdx}, '${dk}')" oncontextmenu="cellContext(event, ${worker.origIdx}, '${dk}')"`}>${content}</div>`;
  });

  return html;
}

function renderLegend(workers) {
  const usedChantiers = new Set(Object.values(state.assignments));
  const legendEl = document.getElementById('legend');
  const colors = {
    '0':'var(--blue)','1':'var(--green)','2':'var(--purple)','3':'var(--orange)',
    '4':'var(--pink)','5':'var(--cyan)','6':'var(--red)','7':'var(--accent)'
  };

  let html = '<span class="filter-label" style="margin-right:8px;">Chantiers</span>';
  state.chantiers.forEach(ch => {
    if (!usedChantiers.has(ch)) return;
    const cc = getChantierColor(ch);
    const colorVar = cc.replace('chantier-','');
    html += `<div class="legend-item"><div class="legend-dot" style="background:${colors[colorVar]};"></div>${ch}</div>`;
  });

  // Crews
  if (state.crews.length > 0) {
    html += `<div class="filter-sep"></div>`;
    html += `<span class="filter-label" style="margin-right:4px;">Binômes</span>`;
    state.crews.forEach(c => {
      const members = state.workers.filter(w => w.crewId === c.id).map(w => w.name);
      html += `<div class="legend-item"><div class="legend-dot" style="background:${c.color};"></div>${c.name}${members.length ? ' (' + members.join(' + ') + ')' : ''}</div>`;
    });
  }

  // ST indicator
  const hasST = (workers || state.workers).some(w => (w.type || '') === 'sous-traitant');
  if (hasST) {
    html += `<div class="filter-sep"></div>`;
    html += `<div class="legend-item"><div class="legend-dot" style="background:var(--purple); opacity:0.5;"></div><span style="font-size:11px;">ST</span> = Sous-traitant</div>`;
  }

  legendEl.innerHTML = html;
}

// ─── INTERACTIONS ───
let assignMode = 'day'; // 'day' | 'week' | 'range'
let assignScope = 'personal'; // 'personal' | 'crew'

function buildWeekOptions(selectedDate) {
  const today = new Date();
  const start = getMonday(addDays(today, -7 * 4));
  const end = addDays(today, 7 * 30); // ~30 weeks ahead
  const sel = document.getElementById('assignWeekSelect');
  sel.innerHTML = '';

  const clickedMonday = dateKey(getMonday(new Date(selectedDate)));
  let d = new Date(start);
  while (d <= end) {
    const mon = new Date(d);
    const fri = addDays(mon, 4);
    const wn = getWeekNumber(mon);
    const monKey = dateKey(mon);

    // Count actual working days (exclude holidays)
    let workDays = 0;
    let holNames = [];
    for (let i = 0; i < 5; i++) {
      const dayDate = addDays(mon, i);
      const dk = dateKey(dayDate);
      if (isHoliday(dk)) {
        holNames.push(getHolidayName(dk));
      } else {
        workDays++;
      }
    }

    let label = `S${wn}  ·  ${formatDateShort(monKey)} → ${formatDateShort(dateKey(fri))}`;
    if (holNames.length > 0) {
      label += `  (${workDays}j — ${holNames.join(', ')})`;
    }

    const selected = monKey === clickedMonday ? 'selected' : '';
    sel.innerHTML += `<option value="${monKey}" ${selected}>${label}</option>`;
    d = addDays(d, 7);
  }
}

function cellClick(e, workerIdx, date) {
  if (tvMode) return;
  e.stopPropagation();
  requireUnlock(() => openCellAssign(workerIdx, date));
}

function openCellAssign(workerIdx, date) {
  assignTarget = { workerIdx, dateKey: date };
  assignMode = 'day';
  assignScope = 'personal';
  const w = state.workers[workerIdx];
  const crew = w.crewId ? state.crews.find(c => c.id === w.crewId) : null;
  
  document.getElementById('assignTitle').textContent = `${w.name} — ${formatDateFR(date)}`;

  // Scope toggle: show only if worker belongs to a crew
  const scopeGroup = document.getElementById('scopeGroup');
  if (crew) {
    scopeGroup.style.display = 'block';
    const crewMembers = state.workers.filter(ww => ww.crewId === crew.id);
    document.getElementById('scopePersonalLabel').textContent = w.name;
    document.getElementById('scopeCrewLabel').textContent = `${crew.name} (${crewMembers.map(m => m.name).join(' + ')})`;
    document.querySelectorAll('[data-scope]').forEach(b => b.classList.toggle('active', b.dataset.scope === 'personal'));
  } else {
    scopeGroup.style.display = 'none';
  }

  // Populate chantier select
  const sel = document.getElementById('assignChantier');
  sel.innerHTML = '<option value="">— Vide (retirer) —</option>';
  state.chantiers.forEach(ch => {
    sel.innerHTML += `<option value="${ch}" ${state.assignments[`${workerIdx}_${date}`] === ch ? 'selected' : ''}>${ch}</option>`;
  });

  // Day field
  document.getElementById('assignDay').value = date;

  // Week select — build options, pre-select the week of the clicked date
  buildWeekOptions(date);

  // Range fields
  const d = new Date(date);
  document.getElementById('assignStart').value = date;
  const dayOfWeek = d.getDay();
  const friday = new Date(d);
  friday.setDate(d.getDate() + (5 - (dayOfWeek === 0 ? 7 : dayOfWeek)));
  document.getElementById('assignEnd').value = dateKey(friday);

  // Reset mode buttons & show correct fields
  document.querySelectorAll('.assign-mode[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === 'day'));
  showModeFields('day');

  // Bind change listeners
  sel.onchange = updateAssignPreview;
  document.getElementById('assignDay').onchange = updateAssignPreview;
  document.getElementById('assignWeekSelect').onchange = updateAssignPreview;
  document.getElementById('assignStart').onchange = updateAssignPreview;
  document.getElementById('assignEnd').onchange = updateAssignPreview;

  updateAssignPreview();
  openModal('assignModal');
}

function setAssignMode(mode) {
  assignMode = mode;
  document.querySelectorAll('.assign-mode[data-mode]').forEach(b => b.classList.toggle('active', b.dataset.mode === mode));
  showModeFields(mode);
  updateAssignPreview();
}

function setAssignScope(scope) {
  assignScope = scope;
  document.querySelectorAll('[data-scope]').forEach(b => b.classList.toggle('active', b.dataset.scope === scope));
  updateAssignPreview();
}

function showModeFields(mode) {
  document.getElementById('dayFields').style.display = mode === 'day' ? 'block' : 'none';
  document.getElementById('weekFields').style.display = mode === 'week' ? 'block' : 'none';
  document.getElementById('rangeFields').style.display = mode === 'range' ? 'block' : 'none';
}

function getAssignDates() {
  if (!assignTarget) return [];
  const dates = [];
  
  if (assignMode === 'day') {
    const val = document.getElementById('assignDay').value;
    if (val) {
      const d = new Date(val);
      if (!isOffDay(d)) dates.push(val);
    }
  } else if (assignMode === 'week') {
    const val = document.getElementById('assignWeekSelect').value;
    if (val) {
      const monday = new Date(val);
      for (let i = 0; i < 5; i++) {
        const day = addDays(monday, i);
        if (!isOffDay(day)) dates.push(dateKey(day));
      }
    }
  } else if (assignMode === 'range') {
    const startVal = document.getElementById('assignStart').value;
    const endVal = document.getElementById('assignEnd').value;
    if (startVal && endVal) {
      const start = new Date(startVal);
      const end = new Date(endVal);
      let d = new Date(start);
      while (d <= end) {
        if (!isOffDay(d)) dates.push(dateKey(d));
        d = addDays(d, 1);
      }
    }
  }
  return dates;
}

function updateAssignPreview() {
  const dates = getAssignDates();
  const ch = document.getElementById('assignChantier').value;
  const preview = document.getElementById('assignPreview');
  
  if (dates.length === 0) {
    preview.innerHTML = 'Aucun jour ouvré sélectionné';
    return;
  }
  
  const action = ch ? `<strong>${ch}</strong>` : '<strong>Vider</strong>';
  const first = formatDateShort(dates[0]);
  const last = formatDateShort(dates[dates.length - 1]);
  
  // Crew info
  let scopeInfo = '';
  if (assignScope === 'crew' && assignTarget) {
    const w = state.workers[assignTarget.workerIdx];
    if (w.crewId) {
      const crew = state.crews.find(c => c.id === w.crewId);
      const count = state.workers.filter(ww => ww.crewId === w.crewId).length;
      if (crew) scopeInfo = ` · <strong>${count}</strong> pers.`;
    }
  }

  if (dates.length === 1) {
    preview.innerHTML = `${action} → ${first}${scopeInfo}`;
  } else {
    preview.innerHTML = `${action} → ${first} au ${last} · <strong>${dates.length}</strong>j${scopeInfo}`;
  }
}

function formatDateShort(dk) {
  const d = new Date(dk);
  return `${DAYS_FR[d.getDay()]} ${d.getDate()}/${(d.getMonth()+1).toString().padStart(2,'0')}`;
}

function confirmAssign() {
  if (!assignTarget) return;
  const ch = document.getElementById('assignChantier').value;
  const dates = getAssignDates();
  if (dates.length === 0) return;

  // Determine which worker indices to assign
  const targetIndices = [];
  if (assignScope === 'crew') {
    const w = state.workers[assignTarget.workerIdx];
    if (w.crewId) {
      state.workers.forEach((ww, idx) => {
        if (ww.crewId === w.crewId) targetIndices.push(idx);
      });
    } else {
      targetIndices.push(assignTarget.workerIdx);
    }
  } else {
    targetIndices.push(assignTarget.workerIdx);
  }

  let totalChanged = 0;
  targetIndices.forEach(wIdx => {
    dates.forEach(dk => {
      const key = `${wIdx}_${dk}`;
      if (ch) {
        state.assignments[key] = ch;
      } else {
        delete state.assignments[key];
      }
      totalChanged++;
    });
  });

  saveState();
  closeModal('assignModal');
  render();
  
  const people = targetIndices.length;
  const dayCount = dates.length;
  if (ch) {
    showToast(`${ch} → ${people > 1 ? people + ' pers. × ' : ''}${dayCount}j`);
  } else {
    showToast(`${dayCount}j vidé${dayCount > 1 ? 's' : ''}${people > 1 ? ' × ' + people + ' pers.' : ''}`);
  }
}

function cellContext(e, workerIdx, date) {
  if (tvMode) return;
  e.preventDefault();
  e.stopPropagation();
  ctxTarget = { workerIdx, dateKey: date };
  const menu = document.getElementById('contextMenu');
  menu.style.left = e.clientX + 'px';

function ctxCopyWeek() {
  closeCtx();
  if (!ctxTarget) return;
  requireUnlock(() => {
    const d = new Date(ctxTarget.dateKey);
    const monday = getMonday(d);
    const nextMonday = addDays(monday, 7);

    let copied = 0;
    for (let i = 0; i < 5; i++) {
      const srcDay = addDays(monday, i);
      const dstDay = addDays(nextMonday, i);
      if (isOffDay(srcDay) || isOffDay(dstDay)) continue;
      const srcKey = `${ctxTarget.workerIdx}_${dateKey(srcDay)}`;
      const dstKey = `${ctxTarget.workerIdx}_${dateKey(dstDay)}`;
      if (state.assignments[srcKey]) {
        state.assignments[dstKey] = state.assignments[srcKey];
        copied++;
      }
    }
    saveState();
    render();
    showToast(`${copied} jour${copied > 1 ? 's' : ''} copié${copied > 1 ? 's' : ''} vers S+1`);
  });
}

function ctxClear() {
  closeCtx();
  if (!ctxTarget) return;
  requireUnlock(() => {
    const key = `${ctxTarget.workerIdx}_${ctxTarget.dateKey}`;
    delete state.assignments[key];
    saveState();
    render();
    showToast('Cellule effacée');
  });
}

// ─── CREW FORM ───
function openCrewForm(idx) {
  editingCrewIdx = idx;
  const pickerEl = document.getElementById('crewColorPicker');
  const membersEl = document.getElementById('crewMembersPicker');
  
  let crewId = null;
  if (idx >= 0) {
    const c = state.crews[idx];
    crewId = c.id;
    document.getElementById('crewModalTitle').textContent = `Modifier — ${c.name}`;
    document.getElementById('crewSubmitBtn').textContent = 'Enregistrer';
    document.getElementById('crewName').value = c.name;
    selectedCrewColor = c.color;
  } else {
    document.getElementById('crewModalTitle').textContent = 'Nouveau binôme';
    document.getElementById('crewSubmitBtn').textContent = 'Créer';
    document.getElementById('crewName').value = '';
    selectedCrewColor = CREW_COLORS[state.crews.length % CREW_COLORS.length];
  }
  
  pickerEl.innerHTML = CREW_COLORS.map(c => 
    `<div class="color-swatch ${c === selectedCrewColor ? 'active' : ''}" style="background:${c};" onclick="pickCrewColor('${c}')"></div>`
  ).join('');
  
  // Build member picker — show all workers, pre-select those in this crew
  membersEl.innerHTML = state.workers.map((w, i) => {
    const inCrew = crewId && w.crewId === crewId;
    const inOther = w.crewId && w.crewId !== crewId;
    const otherCrew = inOther ? state.crews.find(c => c.id === w.crewId) : null;
    const disabled = inOther ? ' disabled' : '';
    const cls = inCrew ? 'member-chip selected' : 'member-chip';
    const label = w.name + (inOther ? ` (${otherCrew?.name || '?'})` : '');
    return `<button class="${cls}" data-widx="${i}" onclick="toggleCrewMember(this)"${disabled}>
      <span class="chip-check">${inCrew ? '✓' : ''}</span>${label}
    </button>`;
  }).join('');
  
  openModal('crewModal');
  setTimeout(() => document.getElementById('crewName').focus(), 100);
}

function toggleCrewMember(btn) {
  btn.classList.toggle('selected');
  const check = btn.querySelector('.chip-check');
  check.textContent = btn.classList.contains('selected') ? '✓' : '';
}

function pickCrewColor(c) {
  selectedCrewColor = c;
  document.querySelectorAll('.color-swatch').forEach(s => {
    s.classList.toggle('active', s.style.background === c);
  });
}

function confirmCrewForm() {
  const name = document.getElementById('crewName').value.trim();
  if (!name) {
    document.getElementById('crewName').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('crewName').style.borderColor = '', 1500);
    return;
  }
  
  let crewId;
  if (editingCrewIdx >= 0) {
    state.crews[editingCrewIdx].name = name;
    state.crews[editingCrewIdx].color = selectedCrewColor;
    crewId = state.crews[editingCrewIdx].id;
  } else {
    crewId = 'crew-' + Date.now();
    state.crews.push({ id: crewId, name, color: selectedCrewColor });
  }
  
  // Update member assignments from the picker
  // First, unassign all workers from this crew
  state.workers.forEach(w => { if (w.crewId === crewId) w.crewId = null; });
  // Then assign selected ones
  document.querySelectorAll('#crewMembersPicker .member-chip.selected').forEach(btn => {
    const wIdx = parseInt(btn.dataset.widx);
    if (!isNaN(wIdx) && state.workers[wIdx]) {
      state.workers[wIdx].crewId = crewId;
    }
  });
  
  saveState();
  closeModal('crewModal');
  renderTeamList();
  render();
  showToast(editingCrewIdx >= 0 ? `${name} modifié` : `${name} créé`);
}

function deleteCrew(idx) {
  const crew = state.crews[idx];
  // Unassign all workers from this crew
  state.workers.forEach(w => { if (w.crewId === crew.id) w.crewId = null; });
  state.crews.splice(idx, 1);
  saveState();
  renderTeamList();
  render();
  showToast(`${crew.name} supprimé`);
}

let pendingDeleteIdx = -1;

function confirmDeleteWorker(idx) {
  const w = state.workers[idx];
  const row = document.getElementById(`teamRow${idx}`);
  if (!row) return;

  // Check if there's already a confirm bar
  if (row.querySelector('.confirm-delete')) return;

  const count = Object.keys(state.assignments).filter(k => k.startsWith(idx + '_')).length;
  const warning = count > 0 ? `${count} affectation${count > 1 ? 's' : ''} seront supprimée${count > 1 ? 's' : ''}` : 'Aucune affectation';

  const bar = document.createElement('div');
  bar.className = 'confirm-delete';
  bar.innerHTML = `
    <span>Supprimer <strong>${w.name}</strong> ? ${warning}.</span>
    <button class="btn btn-sm" onclick="this.closest('.confirm-delete').remove()">Non</button>
    <button class="btn btn-sm" style="background:var(--red);color:#fff;border-color:var(--red);" onclick="executeDeleteWorker(${idx})">Oui</button>
  `;
  row.after(bar);
}

function executeDeleteWorker(idx) {
  const w = state.workers[idx];
  
  // Remove all assignments for this worker
  Object.keys(state.assignments).forEach(k => {
    if (k.startsWith(idx + '_')) delete state.assignments[k];
  });

  // Reindex assignments for workers after the deleted one
  const newAssignments = {};
  Object.entries(state.assignments).forEach(([k, v]) => {
    const [wIdx, date] = k.split('_');
    const wi = parseInt(wIdx);
    if (wi < idx) {
      newAssignments[k] = v;
    } else if (wi > idx) {
      newAssignments[`${wi - 1}_${date}`] = v;
    }
  });
  state.assignments = newAssignments;

  // Remove worker
  state.workers.splice(idx, 1);
  
  saveState();
  renderTeamList();
  render();
  showToast(`${w.name} supprimé`);
}

function navigate(dir) {
  const wrapper = document.getElementById('gridWrapper');
  const headers = wrapper.querySelectorAll('.day-header');
  if (headers.length < 7) return;
  
  // Width of exactly 7 day columns = one week
  const firstHeader = headers[0].getBoundingClientRect();
  const seventhHeader = headers[6].getBoundingClientRect();
  const oneWeekWidth = seventhHeader.right - firstHeader.left;
  
  wrapper.scrollBy({ left: dir * oneWeekWidth, behavior: 'smooth' });
}

document.addEventListener('keydown', (e) => {
  // Don't navigate if a modal is open or an input is focused
  const modalOpen = document.querySelector('.modal-overlay.active');
  const inputFocused = document.activeElement?.tagName === 'INPUT' || document.activeElement?.tagName === 'SELECT';

  if (e.key === 'Escape') {
    closeCtx();
    document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
    if (tvMode) toggleTvMode();
  }
  if (e.key === 'Enter') {
    if (document.getElementById('pinModal').classList.contains('active')) submitPin();
    else if (document.getElementById('chantierModal').classList.contains('active')) confirmAddChantier();
    else if (document.getElementById('workerModal').classList.contains('active')) confirmWorkerForm();
    else if (document.getElementById('assignModal').classList.contains('active')) confirmAssign();
  }
  // Arrow key navigation (works with TV remote)
  if (!modalOpen && !inputFocused) {
    if (e.key === 'ArrowRight') { navigate(1); e.preventDefault(); }
    if (e.key === 'ArrowLeft') { navigate(-1); e.preventDefault(); }
  }
});

// Firebase handles live sync — no need for polling

// ─── PUBLIC HOLIDAYS ───
let publicHolidays = {}; // { '2026-05-01': 'Fête du Travail', ... }

async function fetchHolidays() {
  const today = new Date();
  const years = [today.getFullYear(), today.getFullYear() + 1];
  for (const year of years) {
    try {
      const res = await fetch(`https://calendrier.api.gouv.fr/jours-feries/metropole/${year}.json`);
      if (res.ok) {
        const data = await res.json();
        Object.assign(publicHolidays, data);
      }
    } catch(e) {
      console.warn(`Impossible de charger les jours fériés ${year}`, e);
    }
  }
}

function isHoliday(dk) {
  return !!publicHolidays[dk];
}

function getHolidayName(dk) {
  return publicHolidays[dk] || '';
}

function isOffDay(d) {
  return isWeekend(d) || isHoliday(dateKey(d));
}

// ─── AUTO-SCROLL ON DAY CHANGE ───
let lastKnownDay = todayKey();

function scrollToCurrentDay(smooth) {
  const wrapper = document.getElementById('gridWrapper');
  if (!wrapper) return;
  
  // Find the first working day from today
  const today = new Date();
  let d = new Date(today);
  for (let i = 0; i < 7; i++) {
    d = addDays(today, i);
    if (!isOffDay(d)) break;
  }
  const dk = dateKey(d);
  
  // Find that day's header column
  const target = wrapper.querySelector(`.day-header.today`) 
    || wrapper.querySelector(`.cell[data-date="${dk}"]`);
  
  if (target) {
    const nameCol = wrapper.querySelector('.grid-corner');
    const nameWidth = nameCol ? nameCol.getBoundingClientRect().width : 0;
    const left = target.offsetLeft - nameWidth;
    if (smooth) {
      wrapper.scrollTo({ left, behavior: 'smooth' });
    } else {
      wrapper.scrollLeft = left;
    }
  }
}

// Check every 60 seconds if the day changed
setInterval(() => {
  const now = todayKey();
  if (now !== lastKnownDay) {
    lastKnownDay = now;
    render();
    setTimeout(() => scrollToCurrentDay(true), 100);
  }
}, 60000);

// ─── INIT ───
(async () => {
  await fetchHolidays();

  // Auto TV mode from URL param
  if (new URLSearchParams(window.location.search).get('tv') === 'true') {
    toggleTvMode();
  }

  // Firebase realtime listener — syncs state from all clients
  planningRef.on('value', (snapshot) => {
    const data = snapshot.val();
    if (data) {
      state = data;
      ensureState();
    } else if (!firebaseReady) {
      // First load, no data in Firebase yet — push default state
      state = getDefaultState();
      ensureState();
      saveState();
    }
    firebaseReady = true;
    render();
    // On first load, scroll to today instantly
    if (!window._scrolledToToday) {
      window._scrolledToToday = true;
      setTimeout(() => scrollToCurrentDay(false), 50);
    }
  }, (error) => {
    console.error('Firebase read error:', error);
    // Fallback: render with default state
    if (!firebaseReady) {
      state = getDefaultState();
      ensureState();
      firebaseReady = true;
      render();
    }
  });
})();
</script>
